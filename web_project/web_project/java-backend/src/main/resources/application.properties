# NL Lab - Database config
spring.datasource.url=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:6543/postgres?ssl=true&sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.jcfbtafdpyeptviorddm
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Propiedades robustas de HikariCP para forzar SSL e integrarse bien con Supabase
