<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="description">Accede a tu cuenta de ML Lab</p>

    <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
    
    @if (errorMessage) {
      <app-error-message [message]="errorMessage" (retry)="onSubmit()"></app-error-message>
    }

    @if (successMessage) {
      <div class="success-alert">
        {{ successMessage }}
      </div>
    }

    @if (!isLoading) {
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            required 
            email
            placeholder="ejemplo@escom.edu"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            placeholder="Introduce tu contraseña"
            class="form-control"
          />
        </div>

        <button type="submit" [disabled]="!loginForm.form.valid" class="btn-submit">
          Iniciar Sesión
        </button>

        <div class="register-redirect">
          ¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a>
        </div>
      </form>
    }
  </div>
</div>
