<div class="experiment-list-container">
  <div class="header-actions">
    <h2>Experimentos de Machine Learning</h2>
    <a routerLink="/experiments/new" class="btn-create">Nuevo Experimento</a>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label for="filterModel">Modelo:</label>
      <select id="filterModel" [(ngModel)]="selectedModelId" (change)="onFilterChange()" class="filter-select">
        <option value="">Todos los modelos</option>
        @for (model of models; track model.modelId) {
          <option [value]="model.modelId">{{ model.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label for="filterDataset">Dataset:</label>
      <select id="filterDataset" [(ngModel)]="selectedDatasetId" (change)="onFilterChange()" class="filter-select">
        <option value="">Todos los datasets</option>
        @for (dataset of datasets; track dataset.datasetId) {
          <option [value]="dataset.datasetId">{{ dataset.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label for="filterStatus">Estado:</label>
      <select id="filterStatus" [(ngModel)]="selectedStatus" (change)="onFilterChange()" class="filter-select">
        <option value="">Todos los estados</option>
        <option value="PENDING">Pendiente</option>
        <option value="RUNNING">Ejecutando</option>
        <option value="COMPLETED">Completado</option>
        <option value="FAILED">Fallido</option>
      </select>
    </div>
  </div>

  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
  
  @if (errorMessage) {
    <app-error-message [message]="errorMessage" (retry)="loadAllData()"></app-error-message>
  }

  @if (!isLoading && !errorMessage) {
    <app-data-table 
      [columns]="['experimentId', 'modelName', 'datasetName', 'status', 'createdAt', 'acciones']" 
      [headers]="['ID', 'Modelo', 'Dataset', 'Estado', 'Fecha de Creación', 'Acciones']" 
      [data]="dataTableData" 
      title="Experimentos Registrados"
      (click)="$any($event.target).getAttribute('data-action') === 'delete' && deleteExperiment(+$any($event.target).getAttribute('data-id'))"
    ></app-data-table>
  }
</div>
