<div class="dataset-list-container">
  <div class="header-actions">
    <h2>Conjuntos de Datos (Datasets)</h2>
    <a routerLink="/datasets/new" class="btn-create">Nuevo Dataset</a>
  </div>

  <div class="filter-bar">
    <label for="filterType">Filtrar por Tipo:</label>
    <select id="filterType" [(ngModel)]="selectedType" (change)="onFilterChange()" class="filter-select">
      <option value="">Todos los tipos</option>
      <option value="Clasificación">Clasificación</option>
      <option value="Regresión">Regresión</option>
    </select>
  </div>

  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
  
  @if (errorMessage) {
    <app-error-message [message]="errorMessage" (retry)="loadDatasets()"></app-error-message>
  }

  @if (!isLoading && !errorMessage) {
    <app-data-table 
      [columns]="['datasetId', 'name', 'datasetType', 'numSamples', 'numFeatures', 'targetVariable', 'acciones']" 
      [headers]="['ID', 'Nombre', 'Tipo', 'Muestras', 'Atributos', 'Variable Objetivo', 'Acciones']" 
      [data]="datasets" 
      title="Datasets Disponibles"
      (click)="$any($event.target).getAttribute('data-action') === 'delete' && deleteDataset(+$any($event.target).getAttribute('data-id'))"
    ></app-data-table>
  }
</div>
