<div class="user-list-container">
  <div class="header-actions">
    <h2>Usuarios del Sistema</h2>
    <a routerLink="/users/new" class="btn-create">Nuevo Usuario</a>
  </div>

  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
  
  @if (errorMessage) {
    <app-error-message [message]="errorMessage" (retry)="loadUsers()"></app-error-message>
  }

  @if (!isLoading && !errorMessage) {
    <app-data-table 
      [columns]="columns" 
      [headers]="headers" 
      [data]="users" 
      title="Lista General de Usuarios"
    ></app-data-table>

    <div class="actions-table-container">
      <h3>Acciones de Administración</h3>
      <table class="actions-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user.userId) {
            <tr>
              <td>{{ user.name }}</td>
              <td>
                <div class="btn-group">
                  <a [routerLink]="['/users', user.userId]" class="btn-action view">Ver Detalle</a>
                  <a [routerLink]="['/users', user.userId, 'edit']" class="btn-action edit">Editar</a>
                  <button (click)="deleteUser(user.userId)" class="btn-action delete">Eliminar</button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="2" class="empty-cell">No hay usuarios registrados.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
