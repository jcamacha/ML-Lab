<div class="register-container">
  <div class="register-card">
    <h2>Crear Cuenta</h2>
    <p class="description">Únete a ML Lab y comienza a experimentar</p>

    <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
    
    @if (errorMessage) {
      <app-error-message [message]="errorMessage" (retry)="onSubmit()"></app-error-message>
    }

    @if (successMessage) {
      <div class="success-alert">
        {{ successMessage }}
      </div>
    }

    @if (!isLoading) {
      <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
        <div class="form-group">
          <label for="name">Nombre Completo</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            [(ngModel)]="name" 
            required 
            placeholder="Tu nombre y apellido"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            required 
            email
            placeholder="ejemplo@escom.edu"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            minlength="4"
            placeholder="Crea una contraseña segura"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            required 
            placeholder="Repite tu contraseña"
            class="form-control"
          />
        </div>

        <button type="submit" [disabled]="!registerForm.form.valid" class="btn-submit">
          Registrarse
        </button>

        <div class="login-redirect">
          ¿Ya tienes una cuenta? <a routerLink="/login">Inicia Sesión</a>
        </div>
      </form>
    }
  </div>
</div>
