<div class="file-list-container">
  <div class="header-actions">
    <h2>Almacenamiento de Archivos</h2>
    <a routerLink="/files/upload" class="btn-create">Subir Nuevo Archivo</a>
  </div>

  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
  
  @if (errorMessage) {
    <app-error-message [message]="errorMessage" (retry)="loadFiles()"></app-error-message>
  }

  @if (!isLoading && !errorMessage) {
    <app-data-table 
      [columns]="['fileId', 'fileName', 'fileSizeKb', 'uploadedAt', 'acciones']" 
      [headers]="['ID', 'Nombre de Archivo', 'Tamaño (KB)', 'Fecha de Carga', 'Acciones']" 
      [data]="dataTableData" 
      title="Archivos Subidos"
      (click)="$any($event.target).getAttribute('data-action') === 'delete' && deleteFile(+$any($event.target).getAttribute('data-id'))"
    ></app-data-table>
  }
</div>
