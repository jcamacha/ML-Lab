<div class="model-list-container">
  <div class="header-actions">
    <h2>Catálogo de Modelos de ML</h2>
    <a routerLink="/models/new" class="btn-create">Nuevo Modelo</a>
  </div>

  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
  
  @if (errorMessage) {
    <app-error-message [message]="errorMessage" (retry)="loadModels()"></app-error-message>
  }

  @if (!isLoading && !errorMessage) {
    <app-data-table 
      [columns]="['modelId', 'name', 'category', 'description', 'acciones']" 
      [headers]="['ID', 'Nombre', 'Categoría', 'Descripción', 'Acciones']" 
      [data]="models" 
      title="Modelos Configurados en el Servidor"
      (click)="$any($event.target).getAttribute('data-action') === 'delete' && deleteModel(+$any($event.target).getAttribute('data-id'))"
    ></app-data-table>
  }
</div>
