# ML Lab - Render Blueprint (Docker)
# Despliegue del backend Spring Boot usando Dockerfile

services:
  - type: web
    name: ml-lab-backend
    env: docker
    dockerfilePath: web_project/web_project/java-backend/Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: PORT
        value: 8080
